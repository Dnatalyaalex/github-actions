AWSTemplateFormatVersion: '2010-09-09'
Description: 'S3 bucket for our ci/cd'

Parameters:
  Environment:
    Type: String
    Default: test
    AllowedValues:
      - test
      - staging
      - production

Resources:
  Type: AWS::S3::Bucket 
  Properties:
    BucketName: 'Somebucketnamenow'
    Tags:
      - Key: Environment
        Value: 'dev'

  Outputs:
    BucketName:
      Description: 'Name of created S3 Bucket'
      Value: !Ref MyS3Bucket