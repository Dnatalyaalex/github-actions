name: Deploy AWS Lambda

on:
  push:
    branches:
      - main
    paths:
      - 'lambda/'

jobs:
  deploy-lambda:  # Name of the job
    runs-on: ubuntu-latest   # Sets or specifies the runner
    steps:
      - name: use the code
      - uses: actions/checkout@v2

      - name: Set up Python   # Sets up Python environment
        uses: actions/setup-python@v2
        with:
          python-version: '3.12'

      - name: Install Dependencies # Installs dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r lambda/requirements.txt -t lambda/

      - name: Configure AWS creds #Sets up AWS credentials
        uses: aws-actions/configure-aws-credentials@v1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1

      - name: Deplou Lambda Function #Zips Lambda directory and update lambda function
        run: |
          cd lambda
          zip -r lambda.zip .
          aws lambda update-function-code --function-name my-test-cicd-lambda --zip-file fileb://zip

